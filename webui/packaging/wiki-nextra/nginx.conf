# Serve the Nextra static export. With Next's trailingSlash export, pages live at
# <path>/index.html; try_files resolves clean URLs (with or without a trailing
# slash) and falls back to the generated 404 page.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ $uri.html /404.html;
  }

  # Long-cache the immutable hashed Next.js assets.
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  error_page 404 /404.html;
}
