<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws://localhost:*;"
    />
    <title>CB8</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Helvetica, Arial, sans-serif; }
      * {
        scrollbar-color: #4b5563 #171717;
        scrollbar-width: thin;
      }
      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      *::-webkit-scrollbar-track {
        background: #171717;
      }
      *::-webkit-scrollbar-thumb {
        background: #3f4856;
        border: 2px solid #171717;
        border-radius: 999px;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: #5b6b80;
      }
      *::-webkit-scrollbar-corner {
        background: #171717;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
