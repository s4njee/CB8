<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="CB8 — browse and read your comic and ebook library from any device on your local network." />
  <title>CB8</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <!-- Apply persisted theme before the stylesheet loads to avoid a flash of
       the default red palette. Mirrors the allowed ids in app/theme.js. -->
  <script>
    (function () {
      var allowed = ['red', 'blue', 'green', 'purple', 'orange', 'teal'];
      var t = 'red';
      try {
        var stored = localStorage.getItem('cb8.theme');
        if (stored && allowed.indexOf(stored) !== -1) t = stored;
      } catch (e) { /* localStorage unavailable */ }
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <nav id="navbar">
      <a href="#/" class="nav-brand" id="nav-brand">CB8</a>
      <div class="nav-search-wrap">
        <input
          id="search-input"
          type="search"
          placeholder="Search…"
          autocomplete="off"
          aria-label="Search library"
        />
      </div>
      <div class="nav-actions">
        <select id="sort-select" aria-label="Sort by">
          <option value="title">Title</option>
          <option value="dateAdded">Date added</option>
          <option value="fileSize">File size</option>
          <option value="pageCount">Pages</option>
          <option value="lastRead">Recently Read</option>
        </select>
        <button id="sort-button" type="button" aria-label="Sort options" aria-haspopup="dialog">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18"/><path d="M7 12h10"/><path d="M11 18h2"/>
          </svg>
          <span class="sort-button-label">Title</span>
        </button>
        <div class="media-toggle" role="group" aria-label="Media type">
          <button class="media-btn active" data-type="" id="btn-all">All</button>
          <button class="media-btn" data-type="comic" id="btn-comics">Comics</button>
          <button class="media-btn" data-type="book" id="btn-books">Books</button>
        </div>
        <button id="admin-add-button" type="button" class="admin-add-button" aria-label="Add comic or book">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <button id="admin-button" type="button" class="admin-button" aria-label="Admin">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 21a8 8 0 0 1 16 0"/>
          </svg>
        </button>
      </div>
    </nav>

    <div id="layout">
      <aside id="sidebar">
        <section class="sidebar-section">
          <h2 class="sidebar-heading">Library</h2>
          <ul class="sidebar-list" id="sidebar-all">
            <li><a href="#/" class="sidebar-link active" id="link-all">All</a></li>
            <li><a href="#/continue" class="sidebar-link" id="link-continue">Continue Reading</a></li>
          </ul>
        </section>
        <section class="sidebar-section" id="section-folders">
          <div class="sidebar-heading-row">
            <h2 class="sidebar-heading">Folders</h2>
            <button type="button" class="sidebar-add-btn" id="sidebar-add-folder" aria-label="New folder" title="New folder">+</button>
          </div>
          <ul class="sidebar-list" id="folder-list"></ul>
        </section>
        <section class="sidebar-section" id="section-libraries">
          <div class="sidebar-heading-row">
            <h2 class="sidebar-heading">Collections</h2>
            <button type="button" class="sidebar-add-btn" id="sidebar-add-library" aria-label="New collection" title="New collection">+</button>
          </div>
          <ul class="sidebar-list" id="library-list"></ul>
        </section>
        <section class="sidebar-section" id="section-tags">
          <h2 class="sidebar-heading">Tags</h2>
          <ul class="sidebar-list tag-list" id="tag-list"></ul>
        </section>
      </aside>

      <main id="main-content" role="main" aria-live="polite">
        <div id="view-container"></div>
      </main>
    </div>

    <div id="tab-panel" hidden role="dialog" aria-modal="false" aria-labelledby="tab-panel-title">
      <header class="tab-panel-header">
        <h2 id="tab-panel-title"></h2>
        <button class="tab-panel-add" type="button" id="tab-panel-add" aria-label="Add" title="Add" hidden>+</button>
        <button class="tab-panel-close" type="button" aria-label="Close">✕</button>
      </header>
      <ul class="tab-panel-list"></ul>
    </div>

    <nav id="tab-bar" aria-label="Primary">
      <button data-tab="all" type="button" aria-label="All">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>All</span>
      </button>
      <button data-tab="recent" type="button" aria-label="Recent">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
        </svg>
        <span>Recent</span>
      </button>
      <button data-tab="collections" type="button" aria-label="Collections">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 7V5a2 2 0 0 1 2-2h2"/><path d="M20 7V5a2 2 0 0 0-2-2h-2"/>
          <rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 12h8"/>
        </svg>
        <span>Collections</span>
      </button>
      <button data-tab="folders" type="button" aria-label="Folders">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        <span>Folders</span>
      </button>
      <button data-tab="tags" type="button" aria-label="Tags">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.6 13.4 13 21l-9-9V4h8z"/><circle cx="8" cy="8" r="1.5"/>
        </svg>
        <span>Tags</span>
      </button>
    </nav>

    <div id="sort-sheet" hidden role="dialog" aria-modal="true" aria-label="Sort by">
      <div class="sort-sheet-backdrop"></div>
      <div class="sort-sheet-panel">
        <div class="sort-sheet-title">Sort by</div>
        <button data-sort="title" type="button">Title</button>
        <button data-sort="dateAdded" type="button">Date added</button>
        <button data-sort="fileSize" type="button">File size</button>
        <button data-sort="pageCount" type="button">Pages</button>
        <button data-sort="lastRead" type="button">Recently Read</button>
      </div>
    </div>

    <!-- Reader overlay (hidden by default) -->
    <div id="reader-overlay" class="reader-overlay hidden" role="dialog" aria-modal="true" aria-label="Reader">
      <div id="reader-content"></div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
