name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-electron:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win32

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Python setuptools (macOS)
        if: matrix.platform == 'darwin'
        run: pip3 install --break-system-packages setuptools

      - name: Install AppImage dependencies (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y libfuse2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and make distributables
        run: pnpm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cb8-${{ matrix.platform }}
          path: out/make/**/*
          if-no-files-found: error

  build-standalone:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone bundle
        run: pnpm run build:standalone

      - name: Package standalone tarball
        run: |
          mkdir -p _standalone
          cp dist/standalone.mjs _standalone/
          cp package.json _standalone/
          cp packaging/docker/docker-compose.yaml _standalone/
          tar czf cb8-standalone.tar.gz -C _standalone .

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: cb8-standalone
          path: cb8-standalone.tar.gz
          if-no-files-found: error

  build-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.repo }}:latest

  release:
    needs: [build-electron, build-standalone, build-docker]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Installation

            ### Desktop app (Electron)
            Download the installer for your platform below.

            > **macOS users:** this app is not code-signed. If macOS shows a "damaged" warning,
            > right-click the app → **Open** → **Open**, or run:
            > ```
            > xattr -cr /Applications/CB8.app
            > ```

            ### Docker
            ```
            docker pull ghcr.io/${{ github.repository_owner }}/cb8:${{ github.ref_name }}
            ```
            See `docker-compose.yaml` in the standalone tarball for a ready-to-use compose config.

            ### Standalone (Node.js server)
            Download `cb8-standalone.tar.gz`, extract, then:
            ```
            npm install --omit=dev
            node standalone.mjs
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
